<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rider Safety — Agency Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:     #003366;
    --blue-lt:  #EEF4FB;
    --gold:     #CC9900;
    --ink:      #0d2137;
    --ink-2:    #3a4a5a;
    --muted:    #7090a8;
    --rule:     #dce6f0;
    --bg:       #EEF4FB;
    --card:     #ffffff;
    --row-alt:  #f7fafd;
    --amber-bg: #FAEEDA; --amber-tx: #633806;
  }
  html, body {
    font-family: 'Open Sans', Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 14px; padding: 10px; margin: 0;
    overflow: hidden;
  }
  .controls {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .ctrl-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted);
  }
  .toggle {
    display: flex; background: var(--card);
    border: 1.5px solid var(--rule); border-radius: 40px;
    padding: 3px; gap: 2px;
  }
  .t-btn {
    padding: 5px 16px; border-radius: 40px; border: none;
    background: transparent; font-family: 'Open Sans', Arial, sans-serif;
    font-size: 11px; font-weight: 600; color: var(--muted);
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .t-btn.active { background: var(--navy); color: #fff; }
  .t-btn:hover:not(.active) { background: var(--blue-lt); color: var(--navy); }
  .count { font-size: 11px; color: var(--muted); margin-left: auto; }
  .tbl-wrap {
    border-radius: 10px; border: 0.5px solid var(--rule);
    overflow: hidden; box-shadow: 0 2px 10px rgba(0,51,102,0.05);
    background: var(--card);
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { background: var(--navy); }
  th {
    padding: 10px 12px; font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,255,255,0.8); text-align: left;
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  th:hover { color: #fff; }
  th.sorted { color: #FFD700; }
  th.r { text-align: right; }
  tbody tr { border-bottom: 0.5px solid var(--rule); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  tbody tr:hover { background: var(--blue-lt); }
  td { padding: 9px 12px; color: var(--ink-2); white-space: nowrap; }
  td.r { text-align: right; }
  td.name { font-weight: 600; color: var(--ink); max-width: 250px; overflow: hidden; text-overflow: ellipsis; }
  .rate-chip {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 700;
    background: var(--amber-bg); color: var(--amber-tx);
  }
  .source-note {
    font-size: 10px; color: var(--muted);
    line-height: 1.5; padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
  }
  .state-msg {
    background: var(--card); border-radius: 10px; border: 0.5px solid var(--rule);
    padding: 32px 20px; text-align: center; color: var(--muted); font-size: 13px;
  }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--rule); border-top-color: var(--navy);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: #791F1F; }
  .progress-text { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* Pagination styles */
  .pag-controls { display: flex; gap: 5px; }
  .pag-btn {
    padding: 3px 10px; border: 1px solid var(--rule); background: #fff;
    font-size: 11px; font-weight: 600; color: var(--navy); border-radius: 4px; cursor: pointer;
  }
  .pag-btn:disabled { color: var(--muted); background: #f0f0f0; cursor: not-allowed; border-color: #e0e0e0; }
  .pag-btn:hover:not(:disabled) { background: var(--blue-lt); }
</style>
</head>
<body>

<div class="controls">
  <span class="ctrl-label">Mode</span>
  <div class="toggle">
    <button class="t-btn active" onclick="setMode('Bus', this)">Bus</button>
    <button class="t-btn"        onclick="setMode('Rail', this)">Rail</button>
  </div>
  <span class="count" id="count-label">Loading…</span>
</div>

<div id="table-container">
  <div class="state-msg">
    <div class="spinner"></div>
    <div>Loading agency data from NTD…</div>
    <div class="progress-text" id="progress-text"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION
// ─────────────────────────────────────────────────────────────────────────────
const CONFIG = {
  BASE_URL:  "https://data.transportation.gov/resource/pgwk-wjqa.json",
  PAGE_SIZE: 10000,

  FILTERS: {
    metric:     "event_count",
    event_type: "Major Passenger Assaults and Homicides"
  },

  COLUMNS: {
    agency:     "dba_name",
    uza:        "primary_uza_name",
    upt:        "ridership_6mo_avg",
    rate:       "metric_ridership_6mo_avg_rate",
    mode:       "rail_bus_ferry",
    metric:     "metric",
    event_type: "event_type",
    month_year: "month_year",
    value:      "value" // <--- Added the new Value column here
  },

  ROWS_PER_PAGE: 10
};
// ─────────────────────────────────────────────────────────────────────────────

let allData     = { Bus: [], Rail: [] };
let mode        = "Bus";
let sortKey     = "rate";
let sortDir     = "desc";
let currentPage = 0;

function buildWhere() {
  const f = CONFIG.FILTERS;
  const c = CONFIG.COLUMNS;
  return [
    `${c.metric} = '${f.metric}'`,
    `${c.event_type} = '${f.event_type}'`,
    `(${c.mode} = 'Bus' OR ${c.mode} = 'Rail')`
  ].join(" AND ");
}

async function loadData() {
  const progressEl = document.getElementById("progress-text");
  let offset = 0;
  let total  = 0;
  const seen = new Set();
  allData    = { Bus: [], Rail: [] };

  const where   = buildWhere();
  const orderBy = `${CONFIG.COLUMNS.month_year} DESC`;

  try {
    while (true) {
      const url = `${CONFIG.BASE_URL}?$limit=${CONFIG.PAGE_SIZE}&$offset=${offset}` +
                  `&$where=${encodeURIComponent(where)}` +
                  `&$order=${encodeURIComponent(orderBy)}`;

      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`API error ${resp.status}: ${resp.statusText}`);

      const page = await resp.json();

      page.forEach(row => {
        const rate    = parseFloat(row[CONFIG.COLUMNS.rate]);
        const upt     = parseFloat(row[CONFIG.COLUMNS.upt]);
        const val     = parseFloat(row[CONFIG.COLUMNS.value]); // Grab the value
        const modeVal = (row[CONFIG.COLUMNS.mode] || "").trim();

        if (isNaN(rate)) return;
        if (modeVal !== "Bus" && modeVal !== "Rail") return;

        const key = `${row[CONFIG.COLUMNS.agency]}|${modeVal}`;
        if (seen.has(key)) return;
        seen.add(key);

        const entry = {
          agency: row[CONFIG.COLUMNS.agency]     || "Unknown",
          uza:    row[CONFIG.COLUMNS.uza]        || "Unknown",
          upt:    isNaN(upt) ? null : upt,
          value:  isNaN(val) ? null : val,       // Add the value to our internal memory
          rate:   rate,
          month:  row[CONFIG.COLUMNS.month_year] || ""
        };

        allData[modeVal].push(entry);
      });

      total  += page.length;
      offset += CONFIG.PAGE_SIZE;
      progressEl.textContent = `${total.toLocaleString()} rows scanned…`;

      if (page.length < CONFIG.PAGE_SIZE) break;
    }

    render();

  } catch (err) {
    console.error("Load error:", err);
    document.getElementById("table-container").innerHTML = `
      <div class="state-msg error-msg">
        <div style="font-weight:700;margin-bottom:6px;">Could not load data</div>
        <div style="font-size:12px;opacity:0.8;">${err.message}</div>
      </div>`;
    document.getElementById("count-label").textContent = "Error loading data";
  }
}

function setMode(m, btn) {
  mode = m;
  currentPage = 0; 
  document.querySelectorAll(".t-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function setSort(key) {
  if (sortKey === key) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortKey = key; sortDir = "desc"; }
  currentPage = 0; 
  render();
}

function changePage(step) {
  currentPage += step;
  render();
}

function render() {
  const pool = allData[mode] || [];

  const sortedPool = [...pool].sort((a, b) => {
    let av, bv;
    if      (sortKey === "agency") { av = a.agency;    bv = b.agency;    }
    else if (sortKey === "uza")    { av = a.uza;       bv = b.uza;       }
    else if (sortKey === "upt")    { av = a.upt ?? 0;  bv = b.upt ?? 0;  }
    else if (sortKey === "value")  { av = a.value ?? 0; bv = b.value ?? 0; } // Sort logic for Value
    else                           { av = a.rate;      bv = b.rate;      }

    if (sortKey === "agency" || sortKey === "uza") {
      return sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
    }
    return sortDir === "asc" ? av - bv : bv - av;
  });

  const startIdx = currentPage * CONFIG.ROWS_PER_PAGE;
  const endIdx   = startIdx + CONFIG.ROWS_PER_PAGE;
  const rows     = sortedPool.slice(startIdx, endIdx);
  const totalPages = Math.ceil(sortedPool.length / CONFIG.ROWS_PER_PAGE);

  if (!rows.length) {
    document.getElementById("table-container").innerHTML = `<div class="state-msg">No data found.</div>`;
    document.getElementById("count-label").textContent = `0 agencies`;
    return;
  }

  const asOf = rows[0].month
    ? new Date(rows[0].month).toLocaleDateString("en-US", { month: "long", year: "numeric" })
    : "latest available";

  const arrow = dir => dir === "asc" ? " ↑" : " ↓";
  const sa    = k   => sortKey === k ? arrow(sortDir) : " ↕";

  document.getElementById("table-container").innerHTML = `
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="setSort('agency')" class="${sortKey==='agency'?'sorted':''}">Agency${sa('agency')}</th>
            <th onclick="setSort('uza')"    class="${sortKey==='uza'   ?'sorted':''}">UZA${sa('uza')}</th>
            <th onclick="setSort('upt')"    class="${sortKey==='upt'   ?'sorted r':'r'}">UPT (6MRA)${sa('upt')}</th>
            <th onclick="setSort('value')"  class="${sortKey==='value' ?'sorted r':'r'}">Value${sa('value')}</th>
            <th onclick="setSort('rate')"   class="${sortKey==='rate'  ?'sorted r':'r'}">Rate (6MRA)${sa('rate')}</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(row => `
            <tr>
              <td class="name" title="${row.agency}">${row.agency}</td>
              <td style="color:var(--muted);">${row.uza}</td>
              <td class="r" style="color:var(--muted);">
                ${row.upt !== null ? row.upt.toLocaleString(undefined,{maximumFractionDigits:0}) : "—"}
              </td>
              <td class="r" style="font-weight:600;color:var(--ink);">
                ${row.value !== null ? row.value.toLocaleString(undefined,{maximumFractionDigits:0}) : "—"}
              </td>
              <td class="r"><span class="rate-chip">${row.rate.toFixed(2)}</span></td>
            </tr>`).join("")}
        </tbody>
      </table>
      <div class="source-note">
        <div>
          <strong>As of:</strong> ${asOf} · Page ${currentPage + 1} of ${totalPages || 1}
        </div>
        <div class="pag-controls">
          <button class="pag-btn" onclick="changePage(-1)" ${currentPage === 0 ? 'disabled' : ''}>Prev</button>
          <button class="pag-btn" onclick="changePage(1)" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Next</button>
        </div>
      </div>
    </div>`;

  const displayStart = pool.length > 0 ? startIdx + 1 : 0;
  const displayEnd   = Math.min(endIdx, pool.length);
  document.getElementById("count-label").textContent =
    `${displayStart}-${displayEnd} of ${pool.length.toLocaleString()} agencies · ${mode}`;
}

loadData();
</script>
</body>
</html>
