<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rider Safety — Agency Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:     #003366;
    --blue-lt:  #EEF4FB;
    --gold:     #CC9900;
    --ink:      #0d2137;
    --ink-2:    #3a4a5a;
    --muted:    #7090a8;
    --rule:     #dce6f0;
    --bg:       #EEF4FB;
    --card:     #ffffff;
    --row-alt:  #f7fafd;
    --amber-bg: #FAEEDA; --amber-tx: #633806;
  }
  html, body {
    font-family: 'Open Sans', Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 14px; padding: 20px; min-height: 100vh;
  }
  .controls {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .ctrl-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted);
  }
  .toggle {
    display: flex; background: var(--card);
    border: 1.5px solid var(--rule); border-radius: 40px;
    padding: 3px; gap: 2px;
  }
  .t-btn {
    padding: 5px 16px; border-radius: 40px; border: none;
    background: transparent; font-family: 'Open Sans', Arial, sans-serif;
    font-size: 11px; font-weight: 600; color: var(--muted);
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .t-btn.active { background: var(--navy); color: #fff; }
  .t-btn:hover:not(.active) { background: var(--blue-lt); color: var(--navy); }
  .count { font-size: 11px; color: var(--muted); margin-left: auto; }
  .tbl-wrap {
    border-radius: 10px; border: 0.5px solid var(--rule);
    overflow: hidden; box-shadow: 0 2px 10px rgba(0,51,102,0.05);
    background: var(--card);
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { background: var(--navy); }
  th {
    padding: 10px 12px; font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,255,255,0.8); text-align: left;
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  th:hover { color: #fff; }
  th.sorted { color: #FFD700; }
  th.r { text-align: right; }
  tbody tr { border-bottom: 0.5px solid var(--rule); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  tbody tr:hover { background: var(--blue-lt); }
  td { padding: 9px 12px; color: var(--ink-2); white-space: nowrap; }
  td.r { text-align: right; }
  td.name { font-weight: 600; color: var(--ink); }
  .rate-chip {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 700;
    background: var(--amber-bg); color: var(--amber-tx);
  }
  .source-note {
    font-size: 10px; color: var(--muted);
    line-height: 1.5; padding: 10px 14px;
  }
  .state-msg {
    background: var(--card); border-radius: 10px; border: 0.5px solid var(--rule);
    padding: 32px 20px; text-align: center; color: var(--muted); font-size: 13px;
  }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--rule); border-top-color: var(--navy);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: #791F1F; }
  .progress-text { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .mode-badge {
    display: inline-block; padding: 1px 7px; border-radius: 3px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
    background: #E8EFF8; color: var(--navy);
  }
</style>
</head>
<body>

<div class="controls">
  <span class="ctrl-label">Mode</span>
  <div class="toggle">
    <button class="t-btn active" onclick="setMode('Bus', this)">Bus</button>
    <button class="t-btn"        onclick="setMode('Rail', this)">Rail</button>
  </div>
  <span class="count" id="count-label">Loading…</span>
</div>

<div id="table-container">
  <div class="state-msg">
    <div class="spinner"></div>
    <div>Loading agency data from NTD…</div>
    <div class="progress-text" id="progress-text"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION
// ─────────────────────────────────────────────────────────────────────────────
const CONFIG = {
  BASE_URL:  "https://data.transportation.gov/resource/pgwk-wjqa.json",
  PAGE_SIZE: 10000,

  // Hard filters applied at the API level — only pull exactly the rows we need
  FILTERS: {
    month_year_start: "2025-12-01T00:00:00.000",
    month_year_end:   "2026-12-31T23:59:59.000",
    metric:           "event_count",
    event_type:       "Major Passenger Assaults and Homicides",
    // rail_bus_ferry: "Bus" or "Rail" — handled in WHERE clause below
  },

  COLUMNS: {
    agency: "agency",
    uza:    "primary_uza_name",
    upt:    "ridership_6mo_avg",
    rate:   "metric_ridership_6mo_avg_rate",
    mode:   "rail_bus_ferry",
    metric: "metric",
    event_type: "event_type",
    month_year: "month_year"
  },

  TOP_N: 25
};
// ─────────────────────────────────────────────────────────────────────────────

// allData buckets keyed by mode value from API ("Bus", "Rail") plus "all"
let allData = { all: [], Bus: [], Rail: [] };
let mode    = "Bus";
let sortKey = "rate";
let sortDir = "desc";

// ── Build the SOQL WHERE clause ───────────────────────────────────────────────
function buildWhere() {
  const f = CONFIG.FILTERS;
  const c = CONFIG.COLUMNS;
  // Filter: date range, metric = event_count, event_type, mode Bus OR Rail
  return [
    `${c.month_year} >= '${f.month_year_start}'`,
    `${c.month_year} <= '${f.month_year_end}'`,
    `${c.metric} = '${f.metric}'`,
    `${c.event_type} = '${f.event_type}'`,
    `(${c.mode} = 'Bus' OR ${c.mode} = 'Rail')`
  ].join(" AND ");
}

// ── Paginated fetch ───────────────────────────────────────────────────────────
async function loadData() {
  const progressEl = document.getElementById("progress-text");
  let offset = 0;
  let total  = 0;
  allData    = { all: [], Bus: [], Rail: [] };

  const where = buildWhere();

  try {
    while (true) {
      const url = `${CONFIG.BASE_URL}?$limit=${CONFIG.PAGE_SIZE}&$offset=${offset}&$where=${encodeURIComponent(where)}`;

      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`API error ${resp.status}: ${resp.statusText}`);

      const page = await resp.json();

      // Inspect first row in console to verify column names & values
      if (offset === 0 && page.length > 0) {
        console.log("First row keys:", Object.keys(page[0]));
        console.log("First row sample:", page[0]);
      }

      page.forEach(row => {
        const rate = parseFloat(row[CONFIG.COLUMNS.rate]);
        const upt  = parseFloat(row[CONFIG.COLUMNS.upt]);
        if (isNaN(rate)) return;

        const modeVal = (row[CONFIG.COLUMNS.mode] || "").trim(); // "Bus" or "Rail"

        const entry = {
          agency:  row[CONFIG.COLUMNS.agency]     || "Unknown",
          uza:     row[CONFIG.COLUMNS.uza]         || "Unknown",
          upt:     isNaN(upt) ? null : upt,
          rate:    rate,
          mode:    modeVal,
          month:   row[CONFIG.COLUMNS.month_year] || ""
        };

        allData.all.push(entry);
        if (modeVal === "Bus")  allData.Bus.push(entry);
        if (modeVal === "Rail") allData.Rail.push(entry);
      });

      total  += page.length;
      offset += CONFIG.PAGE_SIZE;
      progressEl.textContent = `${total.toLocaleString()} rows loaded…`;

      if (page.length < CONFIG.PAGE_SIZE) break;
    }

    console.log(`Load complete — all: ${allData.all.length}, Bus: ${allData.Bus.length}, Rail: ${allData.Rail.length}`);
    render();

  } catch (err) {
    console.error("Load error:", err);
    document.getElementById("table-container").innerHTML = `
      <div class="state-msg error-msg">
        <div style="font-weight:700;margin-bottom:6px;">Could not load data</div>
        <div style="font-size:12px;opacity:0.8;">${err.message}</div>
        <div style="font-size:11px;margin-top:8px;opacity:0.6;">Check console for details. Verify column names match the dataset.</div>
      </div>`;
    document.getElementById("count-label").textContent = "Error loading data";
  }
}

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll(".t-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function setSort(key) {
  if (sortKey === key) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortKey = key; sortDir = "desc"; }
  render();
}

function render() {
  const pool = allData[mode] || [];

  // Sort full pool FIRST, then slice to TOP_N
  const rows = [...pool].sort((a, b) => {
    let av, bv;
    if      (sortKey === "agency") { av = a.agency; bv = b.agency; }
    else if (sortKey === "uza")    { av = a.uza;    bv = b.uza;    }
    else if (sortKey === "upt")    { av = a.upt ?? 0; bv = b.upt ?? 0; }
    else if (sortKey === "mode")   { av = a.mode;   bv = b.mode;   }
    else                           { av = a.rate;   bv = b.rate;   }

    if (sortKey === "agency" || sortKey === "uza" || sortKey === "mode") {
      return sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
    }
    return sortDir === "asc" ? av - bv : bv - av;
  }).slice(0, CONFIG.TOP_N);

  const modeLabel = { Bus: "Bus", Rail: "Rail" }[mode] || mode;

  if (!rows.length) {
    document.getElementById("table-container").innerHTML =
      `<div class="state-msg">No data found for "${modeLabel}".<br><span style="font-size:11px;opacity:0.7;">Check console — column names or filter values may not match the API.</span></div>`;
    document.getElementById("count-label").textContent = `0 agencies · ${modeLabel}`;
    return;
  }

  const arrow = dir => dir === "asc" ? " ↑" : " ↓";
  const sa    = k   => sortKey === k ? arrow(sortDir) : " ↕";

  document.getElementById("table-container").innerHTML = `
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="setSort('agency')" class="${sortKey==='agency'?'sorted':''}">Agency${sa('agency')}</th>
            <th onclick="setSort('uza')"    class="${sortKey==='uza'   ?'sorted':''}">UZA${sa('uza')}</th>
            <th onclick="setSort('upt')"    class="${sortKey==='upt'   ?'sorted r':'r'}">UPT (6MRA)${sa('upt')}</th>
            <th onclick="setSort('rate')"   class="${sortKey==='rate'  ?'sorted r':'r'}">Rate (6MRA)${sa('rate')}</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(row => `
            <tr>
              <td class="name">${row.agency}</td>
              <td style="color:var(--muted);">${row.uza}</td>
              <td class="r" style="color:var(--muted);">
                ${row.upt !== null ? row.upt.toLocaleString(undefined,{maximumFractionDigits:0}) : "—"}
              </td>
              <td class="r"><span class="rate-chip">${row.rate.toFixed(2)}</span></td>
            </tr>`).join("")}
        </tbody>
      </table>
      <div class="source-note">
        <strong>Rider security:</strong> Major passenger assaults &amp; homicides — event count rate (6-month rolling avg), Dec 2025–Dec 2026, bus and rail only.<br>
        Source: <a href="https://data.transportation.gov/dataset/S-and-S-Agency-Profiles/pgwk-wjqa"
          target="_blank"
          style="color:var(--navy);text-decoration:none;border-bottom:1px dotted var(--navy);">
          FTA National Transit Database
        </a>
        &nbsp;·&nbsp; Showing top ${rows.length} of ${pool.length.toLocaleString()} agencies by rate
      </div>
    </div>`;

  document.getElementById("count-label").textContent =
    `${rows.length} of ${pool.length.toLocaleString()} agencies · ${modeLabel}`;
}

loadData();
</script>
</body>
</html>
