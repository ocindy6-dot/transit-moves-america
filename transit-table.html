<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rider Safety — Agency Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:     #003366;
    --blue-lt:  #EEF4FB;
    --gold:     #CC9900;
    --ink:      #0d2137;
    --ink-2:    #3a4a5a;
    --muted:    #7090a8;
    --rule:     #dce6f0;
    --bg:       #EEF4FB;
    --card:     #ffffff;
    --row-alt:  #f7fafd;
    --green-bg: #EAF3DE; --green-tx: #27500A;
    --amber-bg: #FAEEDA; --amber-tx: #633806;
    --red-bg:   #FCEBEB; --red-tx:   #791F1F;
  }
  html, body {
    font-family: 'Open Sans', Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 14px; padding: 20px; min-height: 100vh;
  }
  .controls {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .ctrl-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted);
  }
  .toggle {
    display: flex; background: var(--card);
    border: 1.5px solid var(--rule); border-radius: 40px;
    padding: 3px; gap: 2px;
  }
  .t-btn {
    padding: 5px 16px; border-radius: 40px; border: none;
    background: transparent; font-family: 'Open Sans', Arial, sans-serif;
    font-size: 11px; font-weight: 600; color: var(--muted);
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .t-btn.active { background: var(--navy); color: #fff; }
  .t-btn:hover:not(.active) { background: var(--blue-lt); color: var(--navy); }
  .count { font-size: 11px; color: var(--muted); margin-left: auto; }
  .tbl-wrap {
    border-radius: 10px; border: 0.5px solid var(--rule);
    overflow: hidden; box-shadow: 0 2px 10px rgba(0,51,102,0.05);
    background: var(--card);
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { background: var(--navy); }
  th {
    padding: 10px 12px; font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,255,255,0.8); text-align: left;
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  th:hover { color: #fff; }
  th.sorted { color: #FFD700; }
  th.r { text-align: right; }
  tbody tr { border-bottom: 0.5px solid var(--rule); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  tbody tr:hover { background: var(--blue-lt); }
  td { padding: 9px 12px; color: var(--ink-2); white-space: nowrap; }
  td.r { text-align: right; }
  td.name { font-weight: 600; color: var(--ink); }
  .rate-chip {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 700;
  }
  .rc-a { background: var(--amber-bg); color: var(--amber-tx); }
  .tbl-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--row-alt);
    border-top: 0.5px solid var(--rule); font-size: 11px; color: var(--muted);
  }
  .dl-link { color: var(--navy); font-weight: 700; text-decoration: none; font-size: 11px; }
  .dl-link:hover { text-decoration: underline; }
  .source-note { font-size: 10px; color: var(--muted); margin-top: 10px; opacity: 0.75; }
  .state-msg {
    background: var(--card); border-radius: 10px; border: 0.5px solid var(--rule);
    padding: 32px 20px; text-align: center; color: var(--muted); font-size: 13px;
  }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--rule); border-top-color: var(--navy);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: #791F1F; }
</style>
</head>
<body>

<div class="controls">
  <span class="ctrl-label">Mode</span>
  <div class="toggle">
    <button class="t-btn active" onclick="setMode('all', this)">All modes</button>
    <button class="t-btn"        onclick="setMode('bus', this)">Bus</button>
    <button class="t-btn"        onclick="setMode('rail', this)">Rail</button>
  </div>
  <span class="count" id="count-label">Loading...</span>
</div>

<div id="table-container">
  <div class="state-msg">
    <div class="spinner"></div>
    <div>Loading agency data from NTD...</div>
  </div>
</div>

<div class="source-note">
  Source: FTA National Transit Database (NTD) · Major incidents per 1M UPT ·
  <a href="https://datahub.transportation.gov/dataset/pgwk-wjqa"
     target="_blank" style="color:var(--navy);">data.transportation.gov</a>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION 
// ─────────────────────────────────────────────────────────────────────────────
const CONFIG = {
  // Uses the SODA API /resource/ endpoint, limited to 2000 rows to prevent hanging
  DATASET_URL: "https://datahub.transportation.gov/resource/pgwk-wjqa.json?$limit=2000",

  COLUMNS: {
    agency: "agency",
    uza:    "primary_uza_name",
    upt:    "ridership_6mo_avg",
    rate:   "metric_ridership_6mo_avg_rate",
    mode:   "mode_type" // Used by the toggle buttons
  },

  MODE_VALUES: { all:"All", bus:"Bus", rail:"Rail" },
  TOP_N: 25
};
// ─────────────────────────────────────────────────────────────────────────────

let allData   = {};
let mode      = "all";
let sortKey   = "rate";
let sortDir   = "desc";

async function loadData() {
  try {
    const response = await fetch(CONFIG.DATASET_URL);
    if (!response.ok) throw new Error(`API error ${response.status}: ${response.statusText}`);

    const raw = await response.json();

    allData = { all:[], bus:[], rail:[] };

    raw.forEach(row => {
      const modeVal = (row[CONFIG.COLUMNS.mode] || "all").toLowerCase();
      const rate    = parseFloat(row[CONFIG.COLUMNS.rate]);
      const upt     = parseFloat(row[CONFIG.COLUMNS.upt]);

      if (isNaN(rate)) return;

      const entry = {
        agency: row[CONFIG.COLUMNS.agency] || "Unknown",
        uza:    row[CONFIG.COLUMNS.uza] || "Unknown",
        upt:    isNaN(upt) ? null : upt,
        rate:   rate
      };

      allData.all.push(entry);
      if (modeVal.includes(CONFIG.MODE_VALUES.bus.toLowerCase())) allData.bus.push(entry);
      if (modeVal.includes(CONFIG.MODE_VALUES.rail.toLowerCase())) allData.rail.push(entry);
    });

    render();

  } catch(err) {
    document.getElementById("table-container").innerHTML = `
      <div class="state-msg error-msg">
        <div style="font-weight:700;margin-bottom:6px;">Could not load data</div>
        <div style="font-size:12px;opacity:0.8;">${err.message}</div>
      </div>`;
    document.getElementById("count-label").textContent = "Error loading data";
  }
}

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll(".t-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function setSort(key) {
  if (sortKey === key) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortKey = key; sortDir = "desc"; }
  render();
}

function render() {
  const rows = (allData[mode] || [])
    .slice(0, CONFIG.TOP_N)
    .sort((a,b) => {
      const av = sortKey === "agency" ? a.agency : sortKey === "uza" ? a.uza : sortKey === "upt" ? (a.upt||0) : a.rate;
      const bv = sortKey === "agency" ? b.agency : sortKey === "uza" ? b.uza : sortKey === "upt" ? (b.upt||0) : b.rate;
      
      if (sortKey === "agency" || sortKey === "uza") {
        return sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
      }
      return sortDir === "asc" ? av - bv : bv - av;
    });

  const modeLabel = {all:"All modes", bus:"Bus", rail:"Rail"}[mode];

  if (!rows.length) {
    document.getElementById("table-container").innerHTML =
      `<div class="state-msg">No data found for mode "${modeLabel}".</div>`;
    return;
  }

  const arrow = dir => dir === "asc" ? " ↑" : " ↓";
  const sa = k => sortKey === k ? arrow(sortDir) : " ↕";

  document.getElementById("table-container").innerHTML = `
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="setSort('agency')" class="${sortKey==='agency'?'sorted':''}">Agency${sa('agency')}</th>
            <th onclick="setSort('uza')"    class="${sortKey==='uza'?'sorted':''}">UZA${sa('uza')}</th>
            <th onclick="setSort('upt')"    class="${sortKey==='upt'?'sorted r':'r'}">UPT (6MRA)${sa('upt')}</th>
            <th onclick="setSort('rate')"   class="${sortKey==='rate'?'sorted r':'r'}">Rate (6MRA)${sa('rate')}</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(row => {
            return `
              <tr>
                <td class="name">${row.agency}</td>
                <td style="color:var(--muted);">${row.uza}</td>
                <td class="r" style="color:var(--muted);">${row.upt !== null ? row.upt.toLocaleString(undefined,{maximumFractionDigits:0}) : "—"}</td>
                <td class="r"><span class="rate-chip rc-a">${row.rate.toFixed(2)}</span></td>
              </tr>`;
          }).join("")}
        </tbody>
      </table>
      <div class="tbl-footer">
        <span>Showing ${rows.length} agencies · ${modeLabel}</span>
        <a href="https://datahub.transportation.gov/dataset/pgwk-wjqa" target="_blank" class="dl-link">↓ Download full dataset</a>
      </div>
    </div>`;

  document.getElementById("count-label").textContent = `${rows.length} agencies · ${modeLabel}`;
}

loadData();
</script>
</body>
</html>
